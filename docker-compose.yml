version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: opinion-gravity-api
    environment:
      - PORT=4000
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: opinion-gravity-web
    environment:
      - NEXT_PUBLIC_API_BASE=http://api:4000
    depends_on:
      - api
    ports:
      - '3000:3000'

  nginx:
    image: nginx:1.27-alpine
    container_name: opinion-gravity-nginx
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    ports:
      - '80:80'
